<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Essensplan</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/706/706164.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/706/706164.png">
    
    <style>
        :root { 
            --primary: #6c5ce7; 
            --secondary: #00b894;
            --bg: #f0f2f5; 
            --card: #ffffff; 
        }
        
        body { 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            background: var(--bg); 
            padding: 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            margin: 0;
        }

        h2 { color: #2d3436; margin-top: 20px; margin-bottom: 10px; }

        /* Button zur Einkaufsliste */
        .nav-button {
            display: inline-block;
            background: var(--secondary);
            color: white;
            text-decoration: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: bold;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0, 184, 148, 0.3);
            transition: transform 0.2s;
        }
        .nav-button:active { transform: scale(0.95); }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); 
            gap: 15px; 
            width: 100%; 
            max-width: 800px; 
        }

        .day-card { 
            background: var(--card); 
            border-radius: 15px; 
            padding: 15px; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
            border-left: 8px solid var(--primary); 
            cursor: pointer; 
            transition: transform 0.1s; 
            overflow: hidden;
        }
        .day-card:active { transform: scale(0.98); }

        .day-title { 
            font-weight: bold; 
            font-size: 1.3rem; 
            color: var(--primary); 
            margin-bottom: 10px; 
            border-bottom: 1px solid #eee; 
            padding-bottom: 5px;
        }

        .meal-box { margin-bottom: 12px; }
        .label { 
            font-size: 0.75rem; 
            color: #636e72; 
            font-weight: bold; 
            text-transform: uppercase; 
            letter-spacing: 0.5px;
        }

        .content { 
            font-size: 1.1rem; 
            color: #2d3436; 
            min-height: 1.2em; 
            /* Wichtig: Textumbruch für lange Wörter */
            word-wrap: break-word; 
            overflow-wrap: break-word; 
            white-space: normal; 
        }

        .zutaten-liste { 
            display: none; 
            margin-top: 15px; 
            padding: 12px; 
            border: 1px dashed var(--primary); 
            border-radius: 10px; 
            background: #f9f9ff; 
        }
        .zutaten-liste.show { display: block; }

        .loader { margin: 30px; font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .hint { font-size: 0.85rem; color: #636e72; margin-bottom: 20px; }
    </style>
</head>
<body>

    <h2>🍴 Unser Wochenplan</h2>
    
    <a href="Einkaufsliste.html" class="nav-button">🛒 Zur Einkaufsliste</a>
    
    <p class="hint">Tippe auf einen Tag, um Zutaten & Anleitung zu sehen</p>
    
    <div id="loading" class="loader">Gerichte werden serviert...</div>
    <div class="grid" id="app-grid"></div>

    <script>
        // Link zu deiner Google Tabelle
        const myFullUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();

        async function loadPlan() {
            try {
                const response = await fetch(myFullUrl);
                const data = await response.text();
                
                // Teilt Zeilen auf, entfernt leere Zeilen und schneidet die Überschrift (Zeile 1) ab
                const rows = data.split(/\r?\n/).filter(row => row.trim() !== '').slice(1); 
                
                const grid = document.getElementById('app-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    // Trennung der Spalten (CSV-sicher)
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    // Nur Zeilen verarbeiten, die Daten enthalten und keine Überschrift "Tag" sind
                    const dayName = cols[0]?.replace(/"/g, '').trim();
                    if(cols.length >= 2 && dayName.toLowerCase() !== 'tag') {
                        
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        
                        // Klick-Funktion für Zutaten
                        card.onclick = function() {
                            const list = this.querySelector('.zutaten-liste');
                            list.classList.toggle('show');
                        };

                        card.innerHTML = `
                            <div class="day-title">${dayName}</div>
                            <div class="meal-box">
                                <div class="label">Hauptspeise</div>
                                <div class="content">${cols[1]?.replace(/"/g, '') || '-'}</div>
                            </div>
                            <div class="meal-box">
                                <div class="label" style="color:#e17055">Nachspeise / Snack</div>
                                <div class="content">${cols[2]?.replace(/"/g, '') || '-'}</div>
                            </div>
                            <div class="zutaten-liste">
                                <div class="label" style="color:var(--primary)">👨‍🍳 Zutaten & Notizen:</div>
                                <div class="content" style="font-size: 0.95rem; line-height: 1.5; margin-top: 5px;">
                                    ${cols[3]?.replace(/"/g, '').replace(/\n/g, '<br>') || 'Keine Details eingetragen.'}
                                </div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = 'Fehler beim Laden. Prüfe die Internetverbindung.';
            }
        }
        
        // Startet das Laden
        window.onload = loadPlan;
    </script>
</body>
</html>
