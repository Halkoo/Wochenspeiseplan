<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Essensplan & Liste</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        /* Navigation / Umschalter */
        .nav-container { margin-bottom: 20px; }
        .btn-toggle { background: var(--secondary); color: white; border: none; padding: 12px 25px; border-radius: 12px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,184,148,0.3); font-size: 1rem; }
        .btn-toggle.plan-mode { background: var(--primary); box-shadow: 0 4px 10px rgba(108,92,231,0.3); }

        /* Bereiche */
        #plan-view, #list-view { width: 100%; max-width: 800px; display: none; }
        .active { display: block !important; }

        /* Wochenplan Styles */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; }
        .day-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-left: 10px solid var(--primary); cursor: pointer; margin-bottom: 10px; }
        .day-title { font-weight: bold; font-size: 1.4rem; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; }
        .meal-box { margin-bottom: 12px; }
        .label { font-size: 0.75rem; color: #636e72; font-weight: 800; text-transform: uppercase; }
        .label.nachspeise { color: #e17055; }
        .content { font-size: 1.15rem; color: #2d3436; font-weight: 500; word-wrap: break-word; }
        .zutaten-liste { display: none; margin-top: 15px; padding: 15px; border-radius: 12px; border: 1.5px dashed #6c5ce7; background: #f9f9ff; }
        .zutaten-liste.show { display: block; }

        /* Einkaufsliste Styles */
        .list-container { background: white; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .list-item { display: flex; align-items: center; padding: 18px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .list-item.checked span { text-decoration: line-through; color: #b2bec3; }
        .checkbox { width: 25px; height: 25px; border: 2px solid #dfe6e9; border-radius: 7px; margin-right: 15px; flex-shrink: 0; }
        .list-item.checked .checkbox { background: var(--secondary); border-color: var(--secondary); display: flex; align-items: center; justify-content: center; }
        .list-item.checked .checkbox::after { content: '✔'; color: white; font-size: 14px; }

        .loader { margin: 30px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <h2 id="main-title">🍴 Unser Wochenplan</h2>

    <div class="nav-container">
        <button id="toggleBtn" class="btn-toggle" onclick="toggleMode()">🛒 Zur Einkaufsliste</button>
    </div>

    <div id="loading" class="loader">Lade Daten...</div>

    <div id="plan-view" class="active">
        <p style="text-align:center; font-size: 0.9rem; color: #636e72; margin-bottom: 20px;">Tippe einen Tag an für die Anleitung</p>
        <div class="grid" id="plan-grid"></div>
    </div>

    <div id="list-view">
        <div class="list-container" id="shopping-grid"></div>
    </div>

    <script>
        const url = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();
        let isPlanMode = true;

        function toggleMode() {
            isPlanMode = !isPlanMode;
            const planView = document.getElementById('plan-view');
            const listView = document.getElementById('list-view');
            const btn = document.getElementById('toggleBtn');
            const title = document.getElementById('main-title');

            if (isPlanMode) {
                planView.classList.add('active');
                listView.classList.remove('active');
                btn.innerText = "🛒 Zur Einkaufsliste";
                btn.classList.remove('plan-mode');
                title.innerText = "🍴 Unser Wochenplan";
            } else {
                planView.classList.remove('active');
                listView.classList.add('active');
                btn.innerText = "📅 Zum Wochenplan";
                btn.classList.add('plan-mode');
                title.innerText = "🛒 Einkaufsliste";
            }
        }

        async function loadData() {
            try {
                const response = await fetch(url);
                const data = await response.text();
                const rows = data.split('\n').slice(1).filter(row => row.trim() !== '');
                
                const planGrid = document.getElementById('plan-grid');
                const shopGrid = document.getElementById('shopping-grid');
                planGrid.innerHTML = '';
                shopGrid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if (cols.length >= 3) {
                        const tag = cols[0].replace(/"/g, '');
                        const haupt = cols[1]?.replace(/"/g, '') || '-';
                        const nach = cols[2]?.replace(/"/g, '') || '-';
                        const zutaten = cols[3]?.replace(/"/g, '') || '';

                        // 1. Karte für Wochenplan erstellen
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        card.onclick = function() { this.querySelector('.zutaten-liste').classList.toggle('show'); };
                        card.innerHTML = `
                            <div class="day-title">${tag}</div>
                            <div class="meal-box"><div class="label">HAUPTSPEISE</div><div class="content">${haupt}</div></div>
                            <div class="meal-box"><div class="label nachspeise">NACHSPEISE</div><div class="content">${nach}</div></div>
                            <div class="zutaten-liste"><div class="label" style="color:#6c5ce7">👨‍🍳 Anleitung:</div><div class="content">${zutaten || 'Keine Infos'}</div></div>
                        `;
                        planGrid.appendChild(card);

                       // 2. Zutaten für Einkaufsliste extrahieren
if (zutaten && zutaten.trim() !== "" && zutaten.toLowerCase() !== 'zutaten') {
    const einzelTeile = zutaten.split(','); // Trennt bei Komma
    einzelTeile.forEach(z => {
        if(z.trim() !== "") {
            const item = document.createElement('div');
            item.className = 'list-item';
            item.innerHTML = `<div class="checkbox"></div><span>${z.trim()}</span>`;
            item.onclick = function() { this.classList.toggle('checked'); };
            shopGrid.appendChild(item);
        }
    });
}
                    }
                });
            } catch (e) { document.getElementById('loading').innerText = 'Fehler beim Laden.'; }
        }
        window.onload = loadData;
    </script>
</body>
</html>
