<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Wochenplan</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; --accent: #00b894; }
        
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        h2 { color: #2d3436; margin-top: 20px; }
        
        /* Button zur Einkaufsliste */
        .btn-link { background: var(--accent); color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; margin-bottom: 20px; font-weight: bold; box-shadow: 0 4px 10px rgba(0,184,148,0.2); transition: transform 0.2s; }
        .btn-link:active { transform: scale(0.95); }

        /* Grid & Cards */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 800px; padding-bottom: 50px; }
        .day-card { background: var(--card); border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid var(--primary); cursor: pointer; transition: transform 0.1s; }
        .day-card:active { transform: scale(0.98); }
        
        .day-title { font-weight: bold; font-size: 1.2rem; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .meal-box { margin-bottom: 8px; }
        .label { font-size: 0.75rem; color: #636e72; font-weight: bold; text-transform: uppercase; }
        .content { font-size: 1.1rem; color: #2d3436; word-wrap: break-word; }

        /* Das neue "Fenster" für die Anleitung (Modal) */
        #modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 2000; overflow-y: auto; box-sizing: border-box; animation: slideIn 0.3s ease-out; }
        
        @keyframes slideIn {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .modal-header { position: sticky; top: 0; background: white; display: flex; justify-content: space-between; align-items: center; padding: 20px; border-bottom: 2px solid var(--primary); z-index: 2001; }
        .modal-body { padding: 20px; }
        .close-btn { font-size: 2.5rem; cursor: pointer; color: var(--primary); line-height: 1; }
        
        .anleitung-text { font-size: 1.1rem; line-height: 1.6; color: #2d3436; white-space: pre-wrap; word-wrap: break-word; }

        .loader { margin: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <h2>🍴 Unser Wochenplan</h2>
    <a href="Einkaufsliste.html" class="btn-link">🛒 Zur Einkaufsliste</a>
    
    <p style="font-size: 0.85rem; color: #636e72; margin-bottom: 15px;">Tippe einen Tag an für die Anleitung</p>
    
    <div id="loading" class="loader">Lade leckere Gerichte...</div>
    <div class="grid" id="app-grid"></div>

    <div id="modal">
        <div class="modal-header">
            <h2 id="modal-title" style="margin:0; color: var(--primary);">Montag</h2>
            <div class="close-btn" onclick="closeModal()">&times;</div>
        </div>
        <div class="modal-body">
            <div class="label" style="color: var(--accent); margin-bottom: 10px;">Zutaten & Zubereitung:</div>
            <div id="modal-content" class="anleitung-text"></div>
        </div>
    </div>

    <script>
        const myFullUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();

        async function loadPlan() {
            try {
                const response = await fetch(myFullUrl);
                const data = await response.text();
                
                // Überschrift abschneiden und leere Zeilen entfernen
                const rows = data.split('\n').slice(1).filter(row => row.trim() !== ''); 
                
                const grid = document.getElementById('app-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if(cols.length >= 3 && cols[0].replace(/"/g, '').toLowerCase() !== 'tag') {
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        
                        const tag = cols[0].replace(/"/g, '');
                        const haupt = cols[1]?.replace(/"/g, '') || '-';
                        const nach = cols[2]?.replace(/"/g, '') || '-';
                        const info = cols[3]?.replace(/"/g, '') || 'Keine Anleitung hinterlegt.';

                        card.onclick = function() {
                            openModal(tag, info);
                        };

                        card.innerHTML = `
                            <div class="day-title">${tag}</div>
                            <div class="meal-box">
                                <div class="label">Hauptspeise</div>
                                <div class="content">${haupt}</div>
                            </div>
                            <div class="meal-box">
                                <div class="label" style="color:#e17055">Nachspeise</div>
                                <div class="content">${nach}</div>
                            </div>
                            <div style="font-size: 0.8rem; color: var(--primary); text-align: right; margin-top: 5px;">Anleitung öffnen →</div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                document.getElementById('loading').innerText = 'Fehler beim Laden. Bitte Internet prüfen.';
            }
        }

        function openModal(title, text) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-content').innerText = text;
            document.getElementById('modal').style.display = 'block';
            document.body.style.overflow = 'hidden'; // Verhindert Scrollen im Hintergrund
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            document.body.style.overflow = 'auto'; // Reaktiviert Scrollen
        }

        window.onload = loadPlan;
    </script>
</body>
</html>
