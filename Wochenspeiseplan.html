<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Küche & Einkauf</title>
    <style>
        :root { --primary: #6c5ce7; --secondary: #00b894; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; margin: 0; }
        
        /* Navigation Tabs */
        .nav-tabs { display: flex; width: 100%; max-width: 500px; background: #dfe6e9; border-radius: 15px; margin-bottom: 20px; padding: 5px; box-sizing: border-box; }
        .tab-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; background: transparent; transition: 0.3s; font-size: 1rem; }
        .tab-btn.active { background: white; color: var(--primary); box-shadow: 0 4px 10px rgba(0,0,0,0.1); }

        .page { display: none; width: 100%; max-width: 800px; }
        .page.active { display: block; }

        /* Wochenplan Design */
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 15px; }
        .day-card { background: var(--card); border-radius: 20px; padding: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-left: 10px solid var(--primary); margin-bottom: 10px; }
        .day-title { font-weight: bold; font-size: 1.3rem; color: var(--primary); border-bottom: 1px solid #eee; margin-bottom: 10px; padding-bottom: 5px; }
        .meal-box { margin-bottom: 10px; }
        .label { font-size: 0.7rem; color: #636e72; font-weight: 800; text-transform: uppercase; }
        .content { font-size: 1.1rem; color: #2d3436; word-wrap: break-word; }
        .show-btn { width: 100%; background: #f0eeff; color: var(--primary); border: 2px solid var(--primary); padding: 8px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        .zutaten-liste { display: none; margin-top: 10px; padding: 12px; border-radius: 10px; border: 1.5px dashed var(--primary); background: #f9f9ff; }
        .zutaten-liste.show { display: block; }

        /* Einkaufsliste Design */
        .list-container { background: white; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); overflow: hidden; }
        .item { display: flex; align-items: center; padding: 15px 20px; border-bottom: 1px solid #f0f0f0; cursor: pointer; }
        .item.checked span { text-decoration: line-through; color: #b2bec3; }
        .checkbox { width: 22px; height: 22px; border: 2px solid #dfe6e9; border-radius: 6px; margin-right: 15px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
        .item.checked .checkbox { background: var(--secondary); border-color: var(--secondary); }
        .item.checked .checkbox::after { content: '✔'; color: white; font-size: 14px; }
        
        .loader { text-align: center; padding: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <div class="nav-tabs">
        <button class="tab-btn active" onclick="showPage('plan-page', this)">🍴 Wochenplan</button>
        <button class="tab-btn" onclick="showPage('list-page', this)">🛒 Einkauf</button>
    </div>

    <div id="plan-page" class="page active">
        <div id="loading-plan" class="loader">Lade Gerichte...</div>
        <div class="grid" id="plan-grid"></div>
    </div>

    <div id="list-page" class="page">
        <div id="loading-list" class="loader">Lade Liste...</div>
        <div class="list-container" id="shopping-list"></div>
    </div>

    <script>
        const planUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv';
        const listUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=1056757043&single=true&output=csv';

        // Tab-Wechsel Funktion
        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        // Wochenplan laden
        async function loadPlan() {
            try {
                const res = await fetch(planUrl + '&t=' + Date.now());
                const data = await res.text();
                const rows = data.split('\n').slice(1).filter(r => r.trim() !== '');
                const grid = document.getElementById('plan-grid');
                grid.innerHTML = '';
                document.getElementById('loading-plan').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    if(cols.length >= 3) {
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        card.innerHTML = `
                            <div class="day-title">${cols[0].replace(/"/g, '')}</div>
                            <div class="meal-box"><div class="label">Hauptspeise</div><div class="content">${cols[1].replace(/"/g, '')}</div></div>
                            <div class="meal-box"><div class="label" style="color:#e17055">Nachspeise</div><div class="content">${cols[2].replace(/"/g, '')}</div></div>
                            <button class="show-btn" onclick="toggleAnleitung(this)">Anleitung anzeigen ↓</button>
                            <div class="zutaten-liste"><div class="label">Anleitung:</div><div class="content">${cols[3]?.replace(/"/g, '') || '-'}</div></div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch(e) { console.error(e); }
        }

        // Einkaufsliste laden
        async function loadList() {
            try {
                const res = await fetch(listUrl + '&t=' + Date.now());
                const data = await res.text();
                const rows = data.split(/\r?\n/);
                const container = document.getElementById('shopping-list');
                container.innerHTML = '';
                document.getElementById('loading-list').style.display = 'none';

                rows.forEach(row => {
                    const text = row.trim().replace(/"/g, '');
                    if (text && text.toLowerCase() !== 'artikel') {
                        const div = document.createElement('div');
                        div.className = 'item';
                        div.innerHTML = `<div class="checkbox"></div><span>${text}</span>`;
                        div.onclick = function() { this.classList.toggle('checked'); };
                        container.appendChild(div);
                    }
                });
            } catch(e) { console.error(e); }
        }

        function toggleAnleitung(btn) {
            const list = btn.nextElementSibling;
            list.classList.toggle('show');
            btn.innerText = list.classList.contains('show') ? 'Anleitung schließen ↑' : 'Anleitung anzeigen ↓';
        }

        window.onload = () => { loadPlan(); loadList(); };
    </script>
</body>
</html>
