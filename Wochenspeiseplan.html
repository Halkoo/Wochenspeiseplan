<!DOCTYPE html>
<html lang="de">
<head> 
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unser Wochenplan</title>
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        
        h2 { color: #2d3436; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .btn-link { background: #00b894; color: white; text-decoration: none; padding: 12px 25px; border-radius: 12px; margin: 15px 0; font-weight: bold; box-shadow: 0 4px 10px rgba(0,184,148,0.3); display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-link:active { transform: scale(0.95); }

        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 20px; width: 100%; max-width: 800px; }
        
        .day-card { background: var(--card); border-radius: 20px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-left: 10px solid var(--primary); cursor: pointer; transition: 0.2s; position: relative; }
        .day-card:active { transform: scale(0.98); }
        
        .day-title { font-weight: bold; font-size: 1.4rem; color: var(--primary); margin-bottom: 15px; border-bottom: 1px solid #f0f0f0; padding-bottom: 5px; }
        
        .meal-box { margin-bottom: 12px; }
        .label { font-size: 0.75rem; color: #636e72; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px; }
        .label.nachspeise { color: #e17055; }
        
        .content { font-size: 1.15rem; color: #2d3436; font-weight: 500; word-wrap: break-word; }
        
        .toggle-hint { text-align: right; font-size: 0.85rem; color: var(--primary); margin-top: 10px; font-weight: 600; }

        .zutaten-liste { display: none; margin-top: 15px; padding: 15px; border-radius: 12px; border: 1.5px dashed #6c5ce7; background: #f9f9ff; }
        .zutaten-liste.show { display: block; }
        
        .loader { margin: 30px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <h2>🍴 Unser Wochenplan</h2>
    
    <a href="Einkaufsliste.html" class="btn-link">
        <span>🛒</span> Zur Einkaufsliste
    </a>

    <p style="font-size: 0.9rem; color: #636e72; margin-bottom: 20px;">Tippe einen Tag an für die Anleitung</p>

    <div id="loading" class="loader">Lade leckere Gerichte...</div>
    <div class="grid" id="app-grid"></div>

    <script>
        const myFullUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv&t=' + new Date().getTime();

        async function loadPlan() {
            try {
                const response = await fetch(myFullUrl);
                const data = await response.text();
                
                // .slice(1) überspringt die Zeile mit "Tag, Hauptspeise..."
                const rows = data.split('\n').slice(1).filter(row => row.trim() !== ''); 
                
                const grid = document.getElementById('app-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if(cols.length >= 3) {
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        
                        card.onclick = function() {
                            const list = this.querySelector('.zutaten-liste');
                            list.classList.toggle('show');
                        };

                        const tag = cols[0].replace(/"/g, '');
                        const haupt = cols[1]?.replace(/"/g, '') || '-';
                        const nach = cols[2]?.replace(/"/g, '') || '-';
                        const zutaten = cols[3]?.replace(/"/g, '') || 'Keine Anleitung hinterlegt.';

                        card.innerHTML = `
                            <div class="day-title">${tag}</div>
                            <div class="meal-box">
                                <div class="label">HAUPTSPEISE</div>
                                <div class="content">${haupt}</div>
                            </div>
                            <div class="meal-box">
                                <div class="label nachspeise">NACHSPEISE</div>
                                <div class="content">${nach}</div>
                            </div>
                            <div class="toggle-hint">Anleitung öffnen →</div>
                            <div class="zutaten-liste">
                                <div class="label" style="color:#6c5ce7; margin-bottom: 5px;">👨‍🍳 KOCHANLEITUNG:</div>
                                <div class="content" style="font-size: 1rem; line-height: 1.5;">${zutaten}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                document.getElementById('loading').innerText = 'Fehler beim Laden der Daten.';
            }
        }
        window.onload = loadPlan;
    </script>
</body>
</html>
