<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Essensplan</title>
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/706/706164.png">
<link rel="icon" href="https://cdn-icons-png.flaticon.com/512/706/706164.png">
    <style>
        :root { --primary: #6c5ce7; --bg: #f0f2f5; --card: #ffffff; }
        body { font-family: 'Segoe UI', Roboto, sans-serif; background: var(--bg); padding: 10px; display: flex; flex-direction: column; align-items: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; width: 100%; max-width: 800px; }
        .day-card { background: var(--card); border-radius: 15px; padding: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); border-left: 8px solid var(--primary); }
        .day-title { font-weight: bold; font-size: 1.2rem; color: var(--primary); margin-bottom: 10px; border-bottom: 1px solid #eee; }
        .meal-box { margin-bottom: 10px; }
        .label { font-size: 0.8rem; color: #636e72; font-weight: bold; text-transform: uppercase; }
        .content { font-size: 1.1rem; color: #2d3436; min-height: 1.2em; }
        .loader { margin: 20px; font-weight: bold; color: var(--primary); }
    </style>
</head>
<body>

    <h2>🍴 Unser Wochenplan</h2>
    <div id="loading" class="loader">Lade leckere Ideen...</div>
    <div class="grid" id="app-grid"></div>

    <script>
        // HIER DEINEN KOPIERTEN CSV-LINK ZWISCHEN DIE ANFÜHRUNGSZEICHEN SETZEN:
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ2Wor16jblAtFPZRcn3JAizIATOy7reZWFpyQxaNh4x3p1aLIB-Wjt_k4S6IXbPo1PldYB5GBqQ8ZA/pub?gid=0&single=true&output=csv';

        async function loadPlan() {
            try {
                const response = await fetch(csvUrl);
                const data = await response.text();
                const rows = data.split('\n').slice(1); // Kopfzeile überspringen
                
                const grid = document.getElementById('app-grid');
                grid.innerHTML = '';
                document.getElementById('loading').style.display = 'none';

                rows.forEach(row => {
                    const cols = row.split(',');
                    if(cols.length >= 3) {
                        const card = document.createElement('div');
                        card.className = 'day-card';
                        card.innerHTML = `
                            <div class="day-title">${cols[0]}</div>
                            <div class="meal-box">
                                <div class="label">Hauptspeise</div>
                                <div class="content">${cols[1] || '-'}</div>
                            </div>
                            <div class="meal-box">
                                <div class="label" style="color:#e17055">Nachspeise</div>
                                <div class="content">${cols[2] || '-'}</div>
                            </div>
                        `;
                        grid.appendChild(card);
                    }
                });
            } catch (error) {
                document.getElementById('loading').innerText = 'Fehler beim Laden der Daten.';
            }
        }

        window.onload = loadPlan;
    </script>
</body>
</html>
